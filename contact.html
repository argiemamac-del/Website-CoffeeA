<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f8f8f8;
}

/* SECTION */
.contact-section{
    padding:100px 8%;
    text-align:center;
}

/* TITLE */
.contact-section h2{
    font-size:2.8rem;
    color:#006241;
    margin-bottom:10px;
}

/* TEXT */
.contact-section p{
    color:#666;
    font-size:1rem;
}

/* HOME BUTTON */
.back-home{
    margin:30px 0 50px;
}

.back-home a{
    text-decoration:none;
    color:#006241;
    font-size:16px;
    font-weight:600;
    padding:12px 25px;
    border:2px solid #006241;
    border-radius:30px;
    transition:.3s;
    display:inline-block;
}

.back-home a:hover{
    background:#006241;
    color:white;
}

/* GRID */
.contact-info{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:25px;
}

/* CARD */
.contact-card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}

.contact-card:hover{
    transform:translateY(-8px);
}

.contact-card h3{
    color:#006241;
    margin-bottom:15px;
    font-size:1.2rem;
}

.contact-card p{
    color:#555;
    font-size:1rem;
}

.contact-card a{
    text-decoration:none;
    color:#00754a;
    font-weight:600;
    word-break:break-word;
}

.contact-card a:hover{
    text-decoration:underline;
}

/* ================= RESPONSIVE ================= */

/* TABLET */
@media(max-width:768px){

    .contact-section{
        padding:80px 5%;
    }

    .contact-section h2{
        font-size:2.2rem;
    }

    .contact-card{
        padding:25px;
    }
}

/* MOBILE */
@media(max-width:480px){

    .contact-section{
        padding:70px 5%;
    }

    .contact-section h2{
        font-size:1.8rem;
    }

    .contact-section p{
        font-size:0.95rem;
    }

    .back-home a{
        font-size:14px;
        padding:10px 20px;
    }

    .contact-card{
        padding:20px;
    }

    .contact-card h3{
        font-size:1.1rem;
    }

    .contact-card p{
        font-size:0.95rem;
    }
}
</style>
</head>

<body>

<section class="contact-section">

    <h2>Contact Us</h2>
    <p>We'd love to hear from you.</p>

    <div class="back-home">
        <a href="index.html">← Home</a>
    </div>

    <div class="contact-info">

        <div class="contact-card">
            <h3>📞 Phone</h3>
            <p><a href="tel:+639940663667">+63 994 066 3667</a></p>
        </div>

        <div class="contact-card">
            <h3>📧 Email</h3>
            <p><a href="mailto:argieCoffee@gmail.com">argieCoffee@gmail.com</a></p>
        </div>

        <div class="contact-card">
            <h3>📘 Facebook</h3>
            <p><a href="https://facebook.com/argieCoffee" target="_blank">
                facebook.com/argieCoffee
            </a></p>
        </div>

    </div>

</section>

</body>
</html>
